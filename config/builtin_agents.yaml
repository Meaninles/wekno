            file_type: "md"
          template_files: []
        excel:
          requirement_file:
            source: "builtin"
            builtin_id: "gbt9704_2012_excel_requirement"
            file_name: "GB_T_9704_2012_党政机关公文格式_Excel模板要求.md"
            file_type: "md"
          template_files: []
        pdf:
          requirement_file:
            source: "builtin"
            builtin_id: "gbt9704_2012_pdf_requirement"
            file_name: "GB_T_9704_2012_党政机关公文格式_PDF模板要求.md"
            file_type: "md"
          template_files: []
        ppt:
          requirement_file:
            source: "builtin"
            builtin_id: "gbt9704_2012_ppt_requirement"
            file_name: "GB_T_9704_2012_党政机关公文格式_PPT模板要求.md"
            file_type: "md"
          template_files: []
      professional_skills_selection_mode: "none"
      selected_professional_skills: []
      temperature: 0.4
      max_completion_tokens: 8192
      max_iterations: 100
      llm_call_timeout: 600
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      db_data_sources: []
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "get_document_info"
        - "query_knowledge_graph"
        - "wiki_search"
        - "wiki_read_page"
        - "wiki_read_source_doc"
        - "data_schema"
        - "data_analysis"
        - "db_catalog"
        - "db_schema"
        - "db_query"
      web_search_enabled: true
      web_search_max_results: 5
      claude_sdk_web_search_enabled: true
      web_fetch_enabled: true
      web_fetch_top_n: 3
      enable_artifacts: true
      reflection_enabled: true
      multi_turn_enabled: true
      history_turns: 10
      retain_retrieval_history: true
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-wiki-researcher"
    avatar: "📚"
    is_builtin: true
    i18n:
      default:
        name: "Wiki Questioner"
        description: "Specialized agent for answering questions based on Wiki knowledge bases"
      zh-CN:
        name: "维基问答"
        description: "专注于在 Wiki 知识库中回答问题的智能体"
      zh-TW:
        name: "維基問答"
        description: "專注於在 Wiki 知識庫中回答問題的智能體"
      ja-JP:
