      ko-KR:
        name: "범용 에이전트"
        description: "WeKnora 검색, 도구, MCP, Skills 및 데이터베이스 소스를 재사용하는 범용 에이전트"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "general-agent"
      system_prompt_id: "general_claude_agent"
      thinking: true
      temperature: 0.5
      max_completion_tokens: 8192
      max_iterations: 100
      llm_call_timeout: 600
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      db_data_sources: []
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "get_document_info"
        - "query_knowledge_graph"
        - "wiki_search"
        - "wiki_read_page"
        - "wiki_read_source_doc"
        - "data_schema"
        - "data_analysis"
        - "db_catalog"
        - "db_schema"
        - "db_query"
      web_search_enabled: true
      web_search_max_results: 5
      claude_sdk_web_search_enabled: true
      web_fetch_enabled: true
      web_fetch_top_n: 3
      enable_artifacts: true
      reflection_enabled: true
      multi_turn_enabled: true
      history_turns: 10
      retain_retrieval_history: true
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-document-processing"
    avatar: "📄"
    is_builtin: true
    i18n:
      default:
        name: "Document Processing"
        description: "Document-processing agent that creates or modifies Word, Excel, PDF and PPT files directly"
      zh-CN:
        name: "文档处理"
        description: "文档处理智能体，直接生成或修改 Word / Excel / PDF / PPT 文档"
      zh-TW:
        name: "文件處理"
        description: "文件處理智能體，直接生成或修改 Word / Excel / PDF / PPT 文件"
      ja-JP:
        name: "ドキュメント処理"
        description: "Word / Excel / PDF / PPT を直接作成または編集するドキュメント処理エージェント"
      ko-KR:
        name: "문서 처리"
        description: "Word / Excel / PDF / PPT 문서를 직접 생성하거나 수정하는 문서 처리 에이전트"
