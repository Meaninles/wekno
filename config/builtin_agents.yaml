# Built-in Agent Configuration with i18n support
# Each agent has localized name, description, avatar, and config overrides per language.
# The "default" locale is used as fallback when the user's language is not found.

builtin_agents:
  - id: "builtin-quick-answer"
    avatar: ""
    is_builtin: true
    i18n:
      default:
        name: "Quick Answer"
        description: "Knowledge base RAG Q&A for fast and accurate answers"
      zh-CN:
        name: "快速问答"
        description: "基于知识库的 RAG 问答，快速准确地回答问题"
      zh-TW:
        name: "快速問答"
        description: "基於知識庫的 RAG 問答，快速準確地回答問題"
      ja-JP:
        name: "クイック回答"
        description: "ナレッジベース RAG Q&A による迅速で正確な回答"
      ko-KR:
        name: "빠른 답변"
        description: "지식 베이스 RAG Q&A를 통한 빠르고 정확한 답변"
    config:
      agent_mode: "quick-answer"
      system_prompt_id: "default_kb"
      thinking: true
      context_template_id: "default_context"
      temperature: 0.7
      max_completion_tokens: 4096
      web_search_enabled: true
      web_search_max_results: 5
      multi_turn_enabled: true
      history_turns: 5
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3
      enable_query_expansion: true
      enable_rewrite: true
      fallback_strategy: "model"

  - id: "builtin-simple-chat"
    avatar: "💬"
    is_builtin: true
    i18n:
      default:
        name: "Simple Chat"
        description: "General chat with web search and file upload support, without default knowledge base scope"
      zh-CN:
        name: "简单对话"
        description: "不默认绑定知识库，支持网络搜索与上传文件、图片、语音的通用对话"
      zh-TW:
        name: "簡單對話"
        description: "不預設綁定知識庫，支援網路搜尋與上傳文件、圖片、語音的一般對話"
      ja-JP:
        name: "シンプルチャット"
        description: "既定のナレッジベースを使わず、Web検索とファイル・画像・音声アップロードに対応した汎用チャット"
      ko-KR:
        name: "간단한 대화"
        description: "기본 지식 베이스 범위 없이 웹 검색과 파일, 이미지, 음성 업로드를 지원하는 일반 대화"
    config:
      agent_mode: "quick-answer"
      system_prompt_id: "simple_chat"
      thinking: true
      context_template_id: "default_context"
      temperature: 0.7
      max_completion_tokens: 4096
      web_search_enabled: true
      web_search_max_results: 5
      multi_turn_enabled: true
      history_turns: 5
      kb_selection_mode: "none"
      retrieve_kb_only_when_mentioned: false
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3
      enable_query_expansion: true
      enable_rewrite: true
      fallback_strategy: "model"
      image_upload_enabled: true
      audio_upload_enabled: true
      supported_file_types: []

  - id: "builtin-smart-reasoning"
    avatar: ""
    is_builtin: true
    i18n:
      default:
        name: "Smart Reasoning"
        description: "ReAct reasoning framework with multi-step thinking and tool calling"
      zh-CN:
        name: "智能推理"
        description: "ReAct 推理框架，支持多步思考与工具调用"
      zh-TW:
        name: "智能推理"
        description: "ReAct 推理框架，支援多步思考與工具呼叫"
      ja-JP:
        name: "スマート推論"
        description: "ReAct 推論フレームワーク、マルチステップ思考とツール呼び出し対応"
      ko-KR:
        name: "스마트 추론"
        description: "ReAct 추론 프레임워크, 다단계 사고 및 도구 호출 지원"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "rag-qa"
      system_prompt: ""
      thinking: true
      temperature: 0.7
      max_completion_tokens: 4096
      max_iterations: 50
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "query_knowledge_graph"
        - "get_document_info"
      web_search_enabled: true
      web_search_max_results: 5
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 5
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-data-analyst"
    avatar: "🗄️"
    is_builtin: true
    i18n:
      default:
        name: "Data Analyst"
        description: "General-agent runtime data analysis agent for bound MySQL/PostgreSQL sources with SQL and optional structured charts"
      zh-CN:
        name: "数据分析"
        description: "数据分析智能体，支持绑定 MySQL/PostgreSQL 数据源并使用 SQL 分析数据，可按用户要求生成结构化图表"
      zh-TW:
        name: "數據分析"
        description: "數據分析智能體，支援綁定 MySQL/PostgreSQL 資料來源並使用 SQL 分析資料，可按使用者要求生成結構化圖表"
      ja-JP:
        name: "データアナリスト"
        description: "MySQL/PostgreSQL データソースをバインドして SQL 分析し、必要に応じて構造化チャートを生成するデータ分析エージェント"
      ko-KR:
        name: "데이터 분석가"
        description: "MySQL/PostgreSQL 데이터 소스를 바인딩하고 SQL로 분석하며 요청 시 구조화 차트를 생성하는 데이터 분석 에이전트"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "data-analysis"
      system_prompt_id: "data_analyst"
      thinking: true
      temperature: 0.2
      max_completion_tokens: 8192
      max_iterations: 100
      llm_call_timeout: 600
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      db_data_sources: []
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "db_catalog"
        - "db_schema"
        - "db_query"
        - "grep_chunks"
        - "knowledge_search"
        - "list_knowledge_chunks"
        - "query_knowledge_graph"
        - "get_document_info"
        - "database_query"
      web_search_enabled: false
      web_search_max_results: 0
      web_fetch_enabled: true
      web_fetch_top_n: 3
      reflection_enabled: true
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 5
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 5
      rerank_threshold: 0.3

  - id: "builtin-general-agent"
    avatar: "🧠"
    is_builtin: true
    i18n:
      default:
        name: "General Agent"
        description: "General-purpose agent that reuses WeKnora retrieval, tools, MCP, Skills and database sources"
