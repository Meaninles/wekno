# Server configuration
server:
  port: 8080
  host: "0.0.0.0"

# Conversation service configuration
# NOTE: Prompt content is resolved from prompt_templates/ YAML files via xxx_id fields.
# Set the _id to the template ID you want; the system will load its content at startup.
conversation:
  max_rounds: 5
  keyword_threshold: 0.3
  embedding_top_k: 30
  vector_threshold: 0.2
  rerank_threshold: 0.3
  rerank_top_k: 30
  fallback_strategy: "model"
  fallback_response: "抱歉，我无法回答这个问题。"
  fallback_prompt_id: "default_fallback_prompt"  # from prompt_templates/fallback.yaml (mode: "model")
  enable_rewrite: true
  enable_query_expansion: true
  enable_rerank: true
  rewrite_prompt_id: "default_rewrite"  # from prompt_templates/rewrite.yaml (content + user fields)
  generate_summary_prompt_id: "default_summary"  # from prompt_templates/generate_summary.yaml
  generate_session_title_prompt_id: "default_session_title"  # from prompt_templates/generate_session_title.yaml
  summary:
    max_input_chars: 16384
    repeat_penalty: 1.0
    temperature: 0.3
    max_completion_tokens: 4096
    no_match_prefix: |-
      <think>
      </think>
      NO_MATCH
    prompt_id: "default_kb"  # from prompt_templates/system_prompt.yaml
    context_template_id: "default_context"  # from prompt_templates/context_template.yaml
  extract_entities_prompt_id: "default_extract_entities"          # from prompt_templates/graph_extraction.yaml
  extract_relationships_prompt_id: "default_extract_relationships"  # from prompt_templates/graph_extraction.yaml
  generate_questions_prompt_id: "default_generate_questions"        # from prompt_templates/generate_questions.yaml

# Knowledge base configuration
knowledge_base:
  chunk_size: 512
  chunk_overlap: 50
  split_markers: ["\n\n", "\n", "。"]
  document_process_timeout: 2h
  image_processing:
    enable_multimodal: true

extract:
  extract_graph:
    description: |
      基于给定文本，按以下步骤完成信息抽取任务，确保逻辑清晰、信息完整且准确：

      ## 步骤 1：实体抽取与属性补充
      1. **抽取核心实体**：通读文本，按逻辑顺序（如叙事顺序或实体关联紧密度）抽取与任务相关的所有核心实体。
      2. **补充实体属性**：对每个抽取出的实体，全面补充文本中明确提到的详细属性，确保不遗漏关键属性。

      ## 步骤 2：关系抽取与核验
      1. **识别关系类型**：只从指定关系列表中选择对应类型。允许的关系类型为：%s。
      2. **抽取有效关系**：基于已抽取的实体和属性，识别文本中真实存在的关系，确保关系事实准确且没有虚假关联。
      3. **明确关系主体**：对每条抽取出的关系，清楚标注两个相关实体，避免主体混淆。
      4. **补充关系属性**：如果文本包含与某条关系直接相关的补充信息，请将其作为该关系的相关属性。
    tags:
      - "Author"
      - "Alias"
    examples:
      - text: |
          《罗密欧与朱丽叶》是威廉·莎士比亚早期创作的一部悲剧，讲述两个来自敌对家族的意大利青年之间的爱情。
          它是莎士比亚生前最受欢迎的戏剧之一，也以另一个标题《最优秀而悲惨的罗密欧与朱丽叶》为人所知。
          故事围绕蒙太古家族的罗密欧和凯普莱特家族的朱丽叶展开，他们被禁止的爱情最终以悲剧告终。
        node:
          - name: "罗密欧与朱丽叶"
            attributes:
              - "威廉·莎士比亚创作的悲剧"
              - "又名《最优秀而悲惨的罗密欧与朱丽叶》"
              - "莎士比亚最受欢迎的戏剧之一"
          - name: "最优秀而悲惨的罗密欧与朱丽叶"
            attributes:
              - "《罗密欧与朱丽叶》的别名"
          - name: "威廉·莎士比亚"
            attributes:
              - "剧作家"
              - "《罗密欧与朱丽叶》的作者，该剧创作于其早期职业生涯"
        relation:
          - node1: "罗密欧与朱丽叶"
            node2: "威廉·莎士比亚"
            type: "Author"
          - node1: "罗密欧与朱丽叶"
            node2: "最优秀而悲惨的罗密欧与朱丽叶"
            type: "Alias"
  extract_entity:
    description: |
      基于用户问题，按以下步骤处理关键信息抽取任务：
      1. 分析逻辑关联：首先充分分析文本内容，识别其核心逻辑关系，并简要标注核心逻辑类型；
      2. 抽取关键实体：基于已识别的逻辑关系，从文本中精准抽取关键信息，并归类为清晰实体，确保不遗漏核心信息且不添加冗余内容；
      3. 排序实体优先级：按每个实体与文本核心主题的关联紧密度排序，优先呈现最有助于理解主旨的重要实体；
    examples:
      - text: "《罗密欧与朱丽叶》是威廉·莎士比亚早期创作的一部悲剧，也是世界文学中最常上演的戏剧之一。"
        node:
          - name: "罗密欧与朱丽叶"
          - name: "威廉·莎士比亚"
          - name: "世界文学"
  fabri_text:
    with_tag: |
      请随机生成一段与 %s 相关的文本，字数控制在 [50-200]，并尽量包含与这些标签相关的专业术语或典型元素，使文本更有针对性和相关性。
    with_no_tag: |
      请随机生成一段内容自选的文本，字数控制在 [50-200]。


# Tenant configuration
tenant:
  # Enable cross-tenant access (can be enabled for intranet environments)
  enable_cross_tenant_access: false
