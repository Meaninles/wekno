apiVersion: apps/v1
kind: Deployment
metadata:
  name: weknora-mobile-web
  labels:
    app: weknora-mobile-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weknora-mobile-web
  template:
    metadata:
      labels:
        app: weknora-mobile-web
    spec:
      containers:
        - name: mobile-web
          image: weknora-mobile-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: APP_SCHEME
              value: http
            - name: APP_HOST
              value: app
            - name: APP_PORT
              value: "8080"
            - name: MAX_FILE_SIZE_MB
              value: "50"
---
apiVersion: v1
kind: Service
metadata:
  name: weknora-mobile-web
  labels:
    app: weknora-mobile-web
spec:
  type: ClusterIP
  selector:
    app: weknora-mobile-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weknora-mobile-web
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: weknora.example.com
      http:
        paths:
          - path: /mobile
            pathType: Prefix
            backend:
              service:
                name: weknora-mobile-web
                port:
                  number: 80
