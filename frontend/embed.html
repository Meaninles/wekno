<!DOCTYPE html>
<html lang="en">
<head>
    <title>WeKnora Embed</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimal-ui">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <link rel="shortcut icon" type="image/png" href="./public/favicon.ico"/>
    <style>
      html, body, #embed-app { height: 100%; margin: 0; }
    </style>
</head>
<body>
<script>
(function(){
  var methods=['log','info','debug','trace','table','group','groupCollapsed','groupEnd','time','timeLog','timeEnd','count','countReset','dir','dirxml'];
  var noop=function(){};
  for(var i=0;i<methods.length;i++){
    var method=methods[i];
    if(typeof console[method]==='function'){
      Object.defineProperty(console,method,{value:noop,configurable:true,writable:true});
    }
  }
})();
</script>
<script>
(function(){
  document.documentElement.setAttribute('theme-mode', 'light');
  document.documentElement.style.background = '#fff';
  document.body.style.background = '#fff';
})();
</script>
<script src="/config.js"></script>
<script src="/tdesign-icons/0.4.1/fonts/index.js"></script>
<div id="embed-app"></div>
<script type="module" src="/src/embed-main.ts"></script>
</body>
</html>
