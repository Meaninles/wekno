server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    client_max_body_size ${MAX_FILE_SIZE};
    set $weknora_forwarded_host $http_host;
    set $weknora_forwarded_proto $scheme;
    if ($weknora_forwarded_host = "") {
        set $weknora_forwarded_host $host;
    }
    if ($http_x_forwarded_host != "") {
        set $weknora_forwarded_host $http_x_forwarded_host;
    }
    if ($http_x_forwarded_proto != "") {
        set $weknora_forwarded_proto $http_x_forwarded_proto;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json
               application/xml image/svg+xml font/ttf font/otf;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        return 302 /mobile/;
    }

    location = /mobile {
        return 301 /mobile/;
    }

    location /mobile/ {
        root /usr/share/nginx/html;
        index mobile.html;
        try_files $uri $uri/ /mobile/mobile.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location ^~ /mobile/assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /files {
        proxy_pass ${APP_SCHEME}://${APP_HOST}:${APP_PORT}/files;
        proxy_set_header Host $weknora_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $weknora_forwarded_host;
        proxy_set_header X-Forwarded-Proto $weknora_forwarded_proto;
    }

    location /api/ {
        proxy_pass ${APP_SCHEME}://${APP_HOST}:${APP_PORT}/api/;
        proxy_set_header Host $weknora_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $weknora_forwarded_host;
        proxy_set_header X-Forwarded-Proto $weknora_forwarded_proto;

        proxy_connect_timeout 30s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
