{{- if .Values.mobileWeb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "weknora.fullname" . }}-mobile-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weknora.componentLabels" (dict "component" "mobile-web" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.mobileWeb.replicaCount }}
  selector:
    matchLabels:
      {{- include "weknora.componentSelectorLabels" (dict "component" "mobile-web" "context" .) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "weknora.componentSelectorLabels" (dict "component" "mobile-web" "context" .) | nindent 8 }}
    spec:
      {{- include "weknora.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "weknora.serviceAccountName" . }}
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mobile-web
          image: {{ include "weknora.mobileWeb.image" . }}
          imagePullPolicy: {{ .Values.mobileWeb.image.pullPolicy }}
          {{- with .Values.mobileWeb.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: APP_SCHEME
              value: {{ .Values.mobileWeb.appScheme | default "http" | quote }}
            - name: APP_HOST
              value: {{ .Values.mobileWeb.appHost | default "app" | quote }}
            - name: APP_PORT
              value: {{ .Values.mobileWeb.appPort | default .Values.app.service.port | quote }}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            {{- toYaml .Values.mobileWeb.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /mobile/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /mobile/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.mobileWeb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mobileWeb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mobileWeb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weknora.componentLabels" (dict "component" "mobile-web" "context" .) | nindent 4 }}
spec:
  type: {{ .Values.mobileWeb.service.type }}
  selector:
    {{- include "weknora.componentSelectorLabels" (dict "component" "mobile-web" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.mobileWeb.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
